name: ci

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "data/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "data/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e . -r requirements.txt

      - name: Syntax check
        run: python -m compileall src tests scripts

      - name: Generate sample data
        run: python scripts/generate_synthetic_data.py

      - name: Validate sample data
        run: python scripts/validate_sample_data.py

      - name: Run tests
        run: pytest -q
